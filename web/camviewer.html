<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WildLink 2026 | Rack Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/vst-rack.css">
</head>
<body>
    <header>
        <h1>WILDLINK RACK-CONSOLE <small>Ver 2026.1</small></h1>
        <div id="system-vital-bar" class="vst-plugin vital-unit">
            <div class="vital-item">CPU: <span id="vital-cpu">--</span>°C</div>
            <div class="vital-item">RSSI: <span id="vital-rssi">--</span>dBm</div>
            <div class="vital-item">UP: <span id="vital-up">--</span>s</div>
            <div class="vital-item">TIME: <span id="vital-time">--:--:--</span></div>
        </div>
    </header>

    <main id="vst-rack"></main>

    <script src="js/plugins/camera-unit.js"></script>
    <script src="js/vst-manager.js"></script>

    <script>
        // URLのパラメータから id を取得 (?id=node_001 等)
        // 指定がない場合はエラーにするか、デフォルトを表示
        const urlParams = new URLSearchParams(window.location.search);
        const sys_ID = urlParams.get('sys_id');

        if (!sys_ID) {
            alert("ERROR: Node ID is not specified.");
            // 必要に応じて一覧画面へリダイレクト
            // window.location.href = 'sys_monitor.php';
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.vstManagerInstance = new VstManager(sys_ID);
            window.vstManagerInstance.init();
        });
    </script>
</body>
</html>
